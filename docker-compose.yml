# Stack autocontida do projeto: Postgres + ETL.
# Propositalmente NÃO usa o .env local (que aponta pro seu postgres_dev pessoal
# na porta 5433) — este compose sobe seu próprio Postgres isolado, pra o
# projeto funcionar sozinho em qualquer máquina, sem depender de containers
# externos pré-existentes.

services:
  postgres:
    image: postgres:16-alpine
    container_name: lmd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lmd_user
      POSTGRES_PASSWORD: lmd_pass
      POSTGRES_DB: lmd_dashboard
    ports:
      - "5434:5432"   # porta diferente de 5432/5433 pra não colidir com containers que você já tenha
    volumes:
      - lmd_pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lmd_user -d lmd_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl:
    build:
      context: .
      dockerfile: etl/Dockerfile
    container_name: lmd_etl
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres        # nome do serviço = hostname dentro da rede do compose
      POSTGRES_PORT: 5432             # porta INTERNA do container (não a 5434 exposta ao host)
      POSTGRES_USER: lmd_user
      POSTGRES_PASSWORD: lmd_pass
      POSTGRES_DB: lmd_dashboard
      XLSX_PATH: /app/data/Cidadania espanhola SP.xlsx
      XLSX_SHEET_NAME: Citas Marcadas
    volumes:
      - ./data:/app/data:ro   # planilha real fica só no seu disco, nunca vai pra imagem

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: lmd_grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"   # 3001 pra não colidir com outro Grafana que você já tenha na 3000
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: lmd_admin
    volumes:
      - lmd_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  lmd_pg_data:
  lmd_grafana_data:
