services:
  postgres:
    image: postgres:16-alpine
    container_name: lmd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lmd_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lmd_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lmd_dashboard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - lmd_pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lmd_user} -d ${POSTGRES_DB:-lmd_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lmd_pg_data:
