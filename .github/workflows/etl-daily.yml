name: ETL diário — LMD Dashboard

on:
  schedule:
    # 09:00 UTC = 06:00 em São Paulo (horário padrão, sem considerar DST)
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # permite rodar manualmente pela aba Actions do GitHub

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar ETL (fonte: Google Sheets → Neon)
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python etl/main.py --source sheets
