name: ETL diario - LMD Dashboard

on:
  schedule:
    # 09:00 UTC = 06:00 em Sao Paulo (horario padrao, sem considerar DST)
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar ETL - fonte Google Sheets para Neon
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python etl/main.py --source sheets